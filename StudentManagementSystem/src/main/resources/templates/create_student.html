<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand">Student Management System</a>

        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/students}">Students</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4"
        th:text="${student.id != null} ? 'Edit Student' : 'Add Student'">
    </h2>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body">

                    <form th:action="@{/students}" th:object="${student}"
                          method="post" enctype="multipart/form-data">

                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label>First Name</label>
                            <input type="text" th:field="*{firstName}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Last Name</label>
                            <input type="text" th:field="*{lastName}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Upload Resume</label>
                            <input type="file" name="file" class="form-control">
                        </div>

                        <div th:if="${student.resumeFileName != null}" class="mb-3">
                            <label>Current Resume:</label>
                            <a th:href="@{'/uploads/' + ${student.resumeFileName}}"
                               target="_blank"
                               class="btn btn-sm btn-info">
                                View
                            </a>
                        </div>

                        <button type="submit" class="btn btn-success w-100 shadow-sm">
                            Save Student
                        </button>

                        <a th:href="@{/students}" class="btn btn-secondary w-100 mt-2">
                            Cancel
                        </a>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
