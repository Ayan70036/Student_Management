<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand">Student Management System</a>

        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/students}">Students</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-danger" th:href="@{/logout}">Logout</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4">Student List</h2>

    <a th:href="@{/students/new}" class="btn btn-primary shadow-sm mb-3">
        Add Student
    </a>

    <table class="table table-bordered table-striped table-hover shadow">

        <thead class="table-dark">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Resume</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="student : ${students}">

            <td th:text="${student.firstName}"></td>
            <td th:text="${student.lastName}"></td>
            <td th:text="${student.email}"></td>

            <td>
                <a th:if="${student.resumeFileName != null}"
                   th:href="@{'/uploads/' + ${student.resumeFileName}}"
                   target="_blank"
                   class="btn btn-sm btn-info shadow-sm">
                    View
                </a>
                <span th:if="${student.resumeFileName == null}">No File</span>
            </td>

            <td>
                <a th:href="@{/students/edit/{id}(id=${student.id})}"
                   class="btn btn-sm btn-warning shadow-sm">
                    Edit
                </a>

                <a th:href="@{/students/delete/{id}(id=${student.id})}"
                   class="btn btn-sm btn-danger shadow-sm"
                   onclick="return confirm('Delete this student?');">
                    Delete
                </a>
            </td>

        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
