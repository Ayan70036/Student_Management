<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-5">
    <div class="col-md-4 mx-auto">

        <div class="card shadow">
            <div class="card-body">

                <h3 class="text-center mb-3">Teacher Registration</h3>

                <form th:action="@{/register}" th:object="${teacher}" method="post">

                    <!-- ✅ NAME -->
                    <input type="text"
                           th:field="*{name}"
                           class="form-control mb-3"
                           placeholder="Full Name"
                           required>

                    <!-- EMAIL -->
                    <input type="email"
                           th:field="*{email}"
                           class="form-control mb-3"
                           placeholder="Email"
                           required>

                    <!-- PASSWORD -->
                    <input type="password"
                           th:field="*{password}"
                           class="form-control mb-3"
                           placeholder="Password"
                           required>

                    <!-- SUBMIT -->
                    <button class="btn btn-success w-100 shadow-sm">
                        Register
                    </button>

                </form>

                <!-- LOGIN LINK -->
                <div class="text-center mt-3">
                    <a th:href="@{/login}">Already have an account? Login</a>
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
